worker_processes  1;

events {
    worker_connections  1024;
}

http {
    default_type  text/plain;
    sendfile      on;

    server {
        listen 80;

        location = /healthz {
            return 200 "ok\n";
        }

        location / {
            return 200 "docker-lab nginx is ready. attach your gateway containers to docker-lab-net, then replace this config with grpc_pass.\n";
        }
    }
}
