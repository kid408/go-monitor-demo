[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info

[INPUT]
    Name         tail
    Path         /app/logs/go-monitor-demo.log
    Tag          go.demo
    Refresh_Interval 2
    Read_from_Head true

[OUTPUT]
    Name         loki
    Match        go.demo
    Host         loki
    Port         3100
    Labels       job=go-monitor-demo,source=fluent-bit
    Line_Format  json
